<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Casa Inteligente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-card">
        <h1>Painel via API Backend</h1>

        <div class="container-temperatura">
            <h2>Temperatura</h2>
            <p class="txt-temperatura"><span id="temp-val">--</span>°C</p>
        </div>

        <div class="container-led">
            <h2>Controle do LED</h2>
            <div class="grupo-botoes">
                <button onclick="enviarComando('1')" class="btn btn-ligar">
                    Ligar
                </button>
                <button onclick="enviarComando('0')" class="btn btn-desligar">
                    Desligar
                </button>
            </div>
        </div>
    </div>

    <script>
        // Mantendo a sua URL do Codespaces atualizada
        const BACKEND_URL = 'https://sistema-distribuido-mqtt.onrender.com';

        // Busca a temperatura no Backend a cada 2 segundos
        async function buscarTemperatura() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/temperatura`);
                const data = await response.json();
                document.getElementById('temp-val').innerText = data.temperatura;
            } catch (error) {
                console.error("Erro ao buscar temperatura:", error);
            }
        }

        // Envia o comando de clique do botão para o Backend
        async function enviarComando(valor) {
            try {
                await fetch(`${BACKEND_URL}/api/led`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ comando: valor })
                });
                console.log(`Comando ${valor} enviado ao backend.`);
            } catch (error) {
                console.error("Erro ao enviar comando:", error);
            }
        }

        // Executa a busca em loop
        setInterval(buscarTemperatura, 2000);
    </script>
</body>
</html>
